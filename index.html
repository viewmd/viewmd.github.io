<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>viewmd</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Newsreader:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/markdown-it@14/dist/markdown-it.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f0f;
    --surface: #161616;
    --border: #242424;
    --text: #e8e6e1;
    --muted: #6b6b6b;
    --accent: #c8a96e;
    --code-bg: #1a1a1a;
  }

  :root[data-theme="light"] {
    --bg: #fbfbf9;
    --surface: #f3f3f0;
    --border: #e4e4e0;
    --text: #1a1a1a;
    --muted: #707070;
    --accent: #967237;
    --code-bg: #f5f5f2;
  }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Newsreader', Georgia, serif;
    font-size: 18px;
    line-height: 1.75;
    min-height: 100vh;
  }

  #topbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 44px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 24px;
    gap: 16px;
    z-index: 100;
  }

  #topbar .filepath {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex: 1;
  }

  #topbar #theme-toggle {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 3px;
    cursor: pointer;
    white-space: nowrap;
    transition: color 0.15s, border-color 0.15s;
  }

  #topbar #theme-toggle:hover {
    color: var(--accent);
    border-color: var(--accent);
  }

  #container {
    max-width: 740px;
    margin: 0 auto;
    padding: 80px 24px 80px;
  }

  #loading, #error {
    padding-top: 120px;
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--muted);
  }

  #error { color: #c0665a; }

  .md h1, .md h2, .md h3, .md h4, .md h5, .md h6 {
    font-family: 'Newsreader', Georgia, serif;
    font-weight: 500;
    line-height: 1.3;
    margin: 2em 0 0.6em;
    color: var(--text);
  }

  .md h1 { font-size: 2rem; margin-top: 0; border-bottom: 1px solid var(--border); padding-bottom: 0.4em; }
  .md h2 { font-size: 1.45rem; border-bottom: 1px solid var(--border); padding-bottom: 0.3em; }
  .md h3 { font-size: 1.2rem; }

  .md p { margin: 1em 0; }

  .md a { color: var(--accent); text-decoration: underline; text-underline-offset: 3px; }
  .md a:hover { opacity: 0.8; }

  .md code {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.82em;
    background: var(--code-bg);
    border: 1px solid var(--border);
    padding: 1px 6px;
    border-radius: 3px;
    color: var(--accent);
  }

  .md pre {
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 16px 20px;
    overflow-x: auto;
    margin: 1.4em 0;
  }

  .md pre code {
    background: none;
    border: none;
    padding: 0;
    font-size: 0.84em;
    color: var(--text);
  }

  .md blockquote {
    border-left: 3px solid var(--accent);
    padding: 4px 0 4px 20px;
    margin: 1.2em 0;
    color: var(--muted);
    font-style: italic;
  }

  .md ul, .md ol {
    padding-left: 1.6em;
    margin: 0.8em 0;
  }

  .md li { margin: 0.3em 0; }

  .md table {
    width: 100%;
    border-collapse: collapse;
    margin: 1.4em 0;
    font-size: 0.9em;
  }

  .md th {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 8px 14px;
    text-align: left;
    font-weight: 500;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85em;
    color: var(--accent);
  }

  .md td {
    border: 1px solid var(--border);
    padding: 8px 14px;
  }

  .md tr:nth-child(even) td { background: var(--surface); }

  .md img { max-width: 100%; border-radius: 4px; }

  .md hr {
    border: none;
    border-top: 1px solid var(--border);
    margin: 2em 0;
  }

  @media (max-width: 600px) {
    html { font-size: 16px; }
    #container { padding: 70px 16px 60px; }
    #topbar { padding: 0 16px; }
  }
</style>
</head>
<body>

<div id="topbar">
  <span class="filepath" id="filepath"></span>
  <button id="theme-toggle"></button>
</div>

<div id="container">
  <div id="loading">loading...</div>
  <div id="error" style="display:none"></div>
  <div id="content" class="md" style="display:none"></div>
</div>

<script>
  const md = window.markdownit({ html: false, linkify: true, typographer: true });

  const toggleBtn = document.getElementById('theme-toggle');
  const currentTheme = localStorage.getItem('theme') || 'dark';
  document.documentElement.setAttribute('data-theme', currentTheme);
  toggleBtn.textContent = currentTheme === 'dark' ? 'light' : 'dark';

  toggleBtn.addEventListener('click', () => {
    const theme = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', theme);
    localStorage.setItem('theme', theme);
    toggleBtn.textContent = theme === 'dark' ? 'light' : 'dark';
  });

  function buildRawUrl(pathname) {
    const parts = pathname.replace(/^\//, '').split('/');
    if (parts.length < 3) return null;

    const [owner, repo, ...rest] = parts;
    let branch = 'main';
    let fileParts = [];

    if (rest[0] === 'blob' && rest[1]) {
      branch = rest[1];
      fileParts = rest.slice(2);
    } else if (rest[0] === 'refs' && rest[1] === 'heads' && rest[2]) {
      branch = rest[2];
      fileParts = rest.slice(3);
    } else if (rest[0] && rest[0].startsWith('@')) {
      branch = rest[0].slice(1);
      fileParts = rest.slice(1);
    } else {
      branch = 'main';
      fileParts = rest;
    }

    let filePath = fileParts.join('/');
    if (!filePath.endsWith('.md')) filePath += '.md';

    return {
      raw: `https://raw.githubusercontent.com/${owner}/${repo}/refs/heads/${branch}/${filePath}`,
      display: `${owner}/${repo}/${fileParts.join('/')}`,
    };
  }

  async function main() {
    const pathname = window.location.pathname;
    const info = buildRawUrl(pathname);

    if (!info) {
      showError('Invalid URL. Usage: viewmd.github.io/owner/repo/path/to/FILE');
      return;
    }

    document.getElementById('filepath').textContent = info.display;
    document.title = info.display.split('/').pop() + ' — viewmd';

    try {
      const res = await fetch(info.raw);
      if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
      const text = await res.text();
      document.getElementById('loading').style.display = 'none';
      const el = document.getElementById('content');
      el.innerHTML = md.render(text);
      el.style.display = 'block';
    } catch (e) {
      showError(`Failed to load file: ${e.message}`);
    }
  }

  function showError(msg) {
    document.getElementById('loading').style.display = 'none';
    const el = document.getElementById('error');
    el.textContent = msg;
    el.style.display = 'block';
  }

  const urlParams = new URLSearchParams(window.location.search);
  const redirect = urlParams.get('p');
  if (redirect) {
    window.history.replaceState(null, '', decodeURIComponent(redirect));
  }

  main();
</script>
</body>
</html>
