<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Redirecting...</title>
  <script>
    var path = window.location.pathname + window.location.search + window.location.hash;
    window.location.replace(window.location.origin + '?p=' + encodeURIComponent(path));
  </script>
</head>
<body>
</body>
</html>
