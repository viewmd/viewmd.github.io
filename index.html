<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>viewmd</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Newsreader:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.min.css" id="hl-theme">
<script src="https://cdn.jsdelivr.net/npm/markdown-it@14/dist/markdown-it.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/highlight.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --text: #c9d1d9;
    --muted: #8b949e;
    --accent: #58a6ff;
    --code-bg: #161b22;
  }

  :root[data-theme="light"] {
    --bg: #ffffff;
    --surface: #f6f8fa;
    --border: #d0d7de;
    --text: #24292f;
    --muted: #57606a;
    --accent: #0969da;
    --code-bg: #f6f8fa;
  }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Newsreader', Georgia, serif;
    font-size: 18px;
    line-height: 1.75;
    min-height: 100vh;
    scroll-behavior: smooth;
  }

  #topbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 44px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 24px;
    gap: 16px;
    z-index: 100;
  }

  #topbar .filepath {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex: 1;
  }

  #topbar #theme-toggle {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 3px;
    cursor: pointer;
    white-space: nowrap;
    transition: color 0.15s, border-color 0.15s;
  }

  #topbar #theme-toggle:hover {
    color: var(--accent);
    border-color: var(--accent);
  }

  #container {
    max-width: 740px;
    margin: 0 auto;
    padding: 80px 24px 80px;
  }

  #loading, #error {
    padding-top: 120px;
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--muted);
  }

  #error { color: #f85149; }

  #home-view {
    padding-top: 100px;
    text-align: center;
    animation: fadeIn 0.4s ease-out;
  }

  #home-view h1 {
    font-family: 'JetBrains Mono', monospace;
    font-size: 24px;
    font-weight: 400;
    color: var(--accent);
    margin-bottom: 8px;
  }

  #home-view p {
    font-size: 14px;
    color: var(--muted);
    margin-bottom: 30px;
  }

  #home-view input {
    width: 100%;
    max-width: 500px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 12px 16px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    outline: none;
    transition: border-color 0.15s;
  }

  #home-view input:focus {
    border-color: var(--accent);
  }

  .md {
    animation: fadeIn 0.4s ease-out;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .md h1, .md h2, .md h3, .md h4, .md h5, .md h6 {
    font-family: 'Newsreader', Georgia, serif;
    font-weight: 500;
    line-height: 1.3;
    margin: 2em 0 0.6em;
    color: var(--text);
    scroll-margin-top: 60px;
    cursor: pointer;
  }

  .md h1:hover::after, .md h2:hover::after, .md h3:hover::after, 
  .md h4:hover::after, .md h5:hover::after, .md h6:hover::after {
    content: " #";
    color: var(--accent);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8em;
  }

  .md h1 { font-size: 2rem; margin-top: 0; border-bottom: 1px solid var(--border); padding-bottom: 0.4em; }
  .md h2 { font-size: 1.45rem; border-bottom: 1px solid var(--border); padding-bottom: 0.3em; }
  .md h3 { font-size: 1.2rem; }

  .md p { margin: 1em 0; }

  .md a { color: var(--accent); text-decoration: none; }
  .md a:hover { text-decoration: underline; }

  .md code {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85em;
    background: var(--code-bg);
    padding: 2px 6px;
    border-radius: 6px;
    color: var(--text);
  }

  .md pre {
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 16px 20px;
    overflow-x: auto;
    margin: 1.4em 0;
    position: relative;
  }

  .md pre code {
    background: none;
    border: none;
    padding: 0;
    font-size: 0.84em;
    color: var(--text);
    border-radius: 0;
  }

  .pre-copy-btn {
    position: absolute;
    top: 8px; right: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 4px;
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.15s, color 0.15s, border-color 0.15s;
  }

  .md pre:hover .pre-copy-btn {
    opacity: 1;
  }

  .pre-copy-btn:hover {
    color: var(--accent);
    border-color: var(--accent);
  }

  .md blockquote {
    border-left: 4px solid var(--border);
    padding: 0 1em;
    margin: 1.2em 0;
    color: var(--muted);
  }

  .md ul, .md ol {
    padding-left: 2em;
    margin: 0.8em 0;
  }

  .md li { margin: 0.25em 0; }

  .md input[type="checkbox"] {
    margin-right: 6px;
    accent-color: var(--accent);
    vertical-align: middle;
    position: relative;
    top: -1px;
  }

  .md table {
    display: block;
    width: 100%;
    overflow-x: auto;
    border-collapse: collapse;
    margin: 1.4em 0;
    font-size: 0.9em;
  }

  .md th {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 8px 14px;
    text-align: left;
    font-weight: 500;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85em;
  }

  .md td {
    border: 1px solid var(--border);
    padding: 8px 14px;
  }

  .md tr:nth-child(even) td { background: var(--surface); }

  .md img { max-width: 100%; border-radius: 4px; }

  .md hr {
    border: none;
    border-top: 2px solid var(--border);
    margin: 2em 0;
  }

  @media (max-width: 600px) {
    html { font-size: 16px; }
    #container { padding: 70px 16px 60px; }
    #topbar { padding: 0 16px; }
    .pre-copy-btn { opacity: 1; }
  }
</style>
</head>
<body>

<div id="topbar">
  <span class="filepath" id="filepath"></span>
  <button id="theme-toggle"></button>
</div>

<div id="container">
  <div id="loading">loading...</div>
  <div id="error" style="display:none"></div>
  <div id="home-view" style="display:none">
    <h1>viewmd</h1>
    <p>minimalist markdown viewer for github</p>
    <input type="text" id="url-input" placeholder="paste github url here (e.g., github.com/user/repo/blob/main/README.md)">
  </div>
  <div id="content" class="md" style="display:none"></div>
</div>

<script>
  const md = window.markdownit({ html: true, linkify: true, typographer: true });

  const toggleBtn = document.getElementById('theme-toggle');
  const hlTheme = document.getElementById('hl-theme');
  const currentTheme = localStorage.getItem('theme') || 'dark';
  
  function applyTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    toggleBtn.textContent = theme === 'dark' ? 'light' : 'dark';
    hlTheme.href = theme === 'dark' 
      ? 'https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.min.css'
      : 'https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github.min.css';
  }
  
  applyTheme(currentTheme);

  toggleBtn.addEventListener('click', () => {
    const theme = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    localStorage.setItem('theme', theme);
    applyTheme(theme);
  });

  document.getElementById('url-input').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') {
      let val = e.target.value.trim();
      if (!val) return;
      val = val.replace(/^(https?:\/\/)?(www\.)?github\.com/, '');
      window.location.href = window.location.origin + val;
    }
  });

  function buildRawUrl(pathname) {
    const parts = pathname.replace(/^\//, '').split('/');
    if (parts.length < 3) return null;

    const [owner, repo, ...rest] = parts;
    let branch = 'main';
    let fileParts = [];

    if (rest[0] === 'blob' && rest[1]) {
      branch = rest[1];
      fileParts = rest.slice(2);
    } else if (rest[0] === 'refs' && rest[1] === 'heads' && rest[2]) {
      branch = rest[2];
      fileParts = rest.slice(3);
    } else if (rest[0] && rest[0].startsWith('@')) {
      branch = rest[0].slice(1);
      fileParts = rest.slice(1);
    } else {
      branch = 'main';
      fileParts = rest;
    }

    let filePath = fileParts.join('/');
    if (!filePath.endsWith('.md')) filePath += '.md';

    const baseRawDir = `https://raw.githubusercontent.com/${owner}/${repo}/refs/heads/${branch}/${fileParts.slice(0, -1).join('/')}`;

    return {
      raw: `https://raw.githubusercontent.com/${owner}/${repo}/refs/heads/${branch}/${filePath}`,
      display: `${owner}/${repo}/${fileParts.join('/')}`,
      baseRawDir: baseRawDir ? baseRawDir + '/' : ''
    };
  }

  function fixRelativePaths(el, baseUrl) {
    el.querySelectorAll('img').forEach(img => {
      const src = img.getAttribute('src');
      if (src && !src.startsWith('http') && !src.startsWith('data:')) {
        img.src = baseUrl + src.replace(/^\.\//, '');
      }
    });
    el.querySelectorAll('a').forEach(a => {
      const href = a.getAttribute('href');
      if (href && !href.startsWith('http') && !href.startsWith('#')) {
        a.href = window.location.pathname.substring(0, window.location.pathname.lastIndexOf('/')) + '/' + href.replace(/^\.\//, '');
      }
    });
  }

  async function main() {
    const pathname = window.location.pathname;
    
    if (pathname === '/' || pathname === '') {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('home-view').style.display = 'block';
      document.getElementById('filepath').textContent = '~';
      return;
    }

    const info = buildRawUrl(pathname);
    if (!info) {
      showError('Invalid URL. Usage: viewmd.github.io/owner/repo/path/to/FILE');
      return;
    }

    document.getElementById('filepath').textContent = info.display;
    document.title = info.display.split('/').pop() + ' — viewmd';

    try {
      const res = await fetch(info.raw);
      if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
      const text = await res.text();
      document.getElementById('loading').style.display = 'none';
      
      const el = document.getElementById('content');
      let htmlContent = md.render(text);
      
      htmlContent = htmlContent
        .replace(/\[ \]/g, '<input type="checkbox" disabled>')
        .replace(/\[x\]/g, '<input type="checkbox" checked disabled>');
        
      el.innerHTML = htmlContent;
      
      fixRelativePaths(el, info.baseRawDir);
      
      if (typeof hljs !== 'undefined') {
        el.querySelectorAll('pre code').forEach(block => hljs.highlightElement(block));
      }

      el.querySelectorAll('pre').forEach(pre => {
        const btn = document.createElement('button');
        btn.className = 'pre-copy-btn';
        btn.textContent = 'copy';
        pre.appendChild(btn);
        btn.addEventListener('click', () => {
          const codeEl = pre.querySelector('code');
          if (!codeEl) return;
          navigator.clipboard.writeText(codeEl.textContent).then(() => {
            btn.textContent = 'copied!';
            setTimeout(() => { btn.textContent = 'copy'; }, 2000);
          });
        });
      });

      el.querySelectorAll('h1, h2, h3, h4, h5, h6').forEach(heading => {
        const slug = heading.textContent.trim().toLowerCase()
          .replace(/[^\w\s-]/g, '')
          .replace(/\s+/g, '-');
        heading.id = slug;
        heading.addEventListener('click', () => {
          window.location.hash = slug;
          navigator.clipboard.writeText(window.location.href);
        });
      });
      
      el.style.display = 'block';

      if (window.location.hash) {
        const target = document.getElementById(decodeURIComponent(window.location.hash.substring(1)));
        if (target) {
          setTimeout(() => target.scrollIntoView(), 150);
        }
      }
    } catch (e) {
      showError(`Failed to load file: ${e.message}`);
    }
  }

  function showError(msg) {
    document.getElementById('loading').style.display = 'none';
    const el = document.getElementById('error');
    el.textContent = msg;
    el.style.display = 'block';
  }

  const urlParams = new URLSearchParams(window.location.search);
  const redirect = urlParams.get('p');
  if (redirect) {
    window.history.replaceState(null, '', decodeURIComponent(redirect));
  }

  main();
</script>
</body>
</html>
